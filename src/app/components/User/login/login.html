<p-toast />

<div class="login-container min-h-screen flex align-items-center justify-content-center p-3 bg-cover bg-center">
    
    @if (isLoading) {
    <div class="login-loading-overlay fixed top-0 left-0 w-full h-full flex align-items-center justify-content-center z-5">
        <p-progressSpinner [style]="{ width: '50px', height: '50px' }" strokeWidth="4"></p-progressSpinner>
    </div>
    }

    <div class="login-card w-full max-w-28rem p-5 md:p-7 border-round-2xl shadow-8" [ngClass]="{ 'loading': isLoading }">
        <h2 class="text-center text-4xl font-bold m-0 mb-5 text-900">Login</h2>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-4">
            <div class="flex flex-column gap-2">
                <p-floatlabel variant="in" class="w-full">
                    <input pInputText id="email" formControlName="Email" class="login-input w-full p-3 border-round-lg" />
                    <label for="email">Email</label>
                </p-floatlabel>
                @if (isInvalid('Email')) {
                    <p-message severity="error" size="small" variant="simple">Email is required.</p-message>
                }
            </div>

            <div class="flex flex-column gap-2">
                <p-floatlabel variant="in" class="w-full">
                    <input pInputText type="password" id="pass" formControlName="Password" class="login-input w-full p-3 border-round-lg" />
                    <label for="pass">Password</label>
                </p-floatlabel>
                @if (isInvalid('Password')) {
                    <p-message severity="error" size="small" variant="simple">Password required.</p-message>
                }
            </div>

            <div class="flex align-items-center justify-content-between gap-3 my-2">
                <div class="flex align-items-center gap-2">
                    <p-checkbox [(ngModel)]="rememberMe" [ngModelOptions]="{standalone: true}" [binary]="true" inputId="rememberMe"></p-checkbox>
                    <label for="rememberMe" class="text-sm font-medium cursor-pointer">Remember me</label>
                </div>
                <a href="#" class="forgot-password-link text-sm font-medium no-underline">Forgot Password?</a>
            </div>

            <button pButton type="submit" [label]="isLoading ? 'Logging in...' : 'Login'" 
                    class="login-button w-full p-3 font-bold border-round-lg"></button>
        </form>

        <div class="text-center mt-5 pt-5 border-top-1 border-white-alpha-30">
            <span class="text-sm">Don't have an account?</span>
            <a href="/register" class="register-link ml-1 text-sm font-bold no-underline">Register</a>
        </div>
    </div>
</div>
